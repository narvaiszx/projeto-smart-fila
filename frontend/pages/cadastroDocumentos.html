<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Aluno - Cadastro de Documentos</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
     <header>
    <section id="logoMenu">
        <a href="../index.html" target="_self">
            <h1>Smart Fila</h1>
        </a>
    </section>
    <section id="menuCadastro">
        <a href="cadastroTurma.html" target="_self">
            <button type="button">Cad. Turma</button>
        </a>
        <a href="cadastroDocumentos.html" target="_self">
            <button type="button">Cad. Documento</button>
        </a>
        <a href="cadastroAluno.html" target="_self">
            <button type="button">Cad. Aluno</button>
        </a>
    </section>
   </header>
   <main class="container-cadastro">
    <section id="formulario">
        <h2>Cadastrar Documentos</h2>
        <form id="documentosForm">
            <input type="hidden" id="documentoId">
            <div class="inputGroup">
                <label for="rg">RG:</label>
                <input type="text" id="rg" placeholder="Ex.: 12.345.678-9">
            </div>
            <div class="inputGroup">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="Ex.: 123.456.789-00">
            </div>
            <button type="submit" id="btnSalvar">Salvar Documentos</button>
        </form>
    </section>
    <section id="lista">
        <h2>Documentos Cadastrados</h2>
        <table>
            <thead>
                <tr>
                <th>ID</th>
                <th>RG</th>
                <th>CPF</th>
                <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                
            </tbody>
        </table>
    </section>
   </main>
</body>
</html>
